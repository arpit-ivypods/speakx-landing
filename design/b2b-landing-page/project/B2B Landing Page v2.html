<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cohere — L&D operating system</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #0A0B14; font-family: "Inter Tight", system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
  a:hover { opacity: .7; }
  ::selection { background: #A78BFA; color: #08080A; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0A0B14; }
  ::-webkit-scrollbar-thumb { background: rgba(232,232,240,.15); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="directionB-full.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "iris",
  "typePair": "mono",
  "mode": "dark",
  "heroCopy": "outcomes"
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DirectionBFull tweaks={tw} />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Palette">
          <TweakRadio label="Theme" value={tw.palette} onChange={(v) => setTweak("palette", v)}
            options={[{value:"iris",label:"Iris"},{value:"midnight",label:"Mint"},{value:"noir",label:"Ember"}]} />
          <TweakRadio label="Mode" value={tw.mode} onChange={(v) => setTweak("mode", v)}
            options={[{value:"dark",label:"Dark"},{value:"light",label:"Light"}]} />
        </TweakSection>
        <TweakSection title="Typography">
          <TweakSelect label="Type pairing" value={tw.typePair} onChange={(v) => setTweak("typePair", v)}
            options={[{value:"mono",label:"Space Grotesk + Mono"},{value:"grotesque",label:"Inter Tight throughout"},{value:"technical",label:"Space Grotesk technical"}]} />
        </TweakSection>
        <TweakSection title="Hero copy">
          <TweakSelect label="Headline" value={tw.heroCopy} onChange={(v) => setTweak("heroCopy", v)}
            options={[{value:"outcomes",label:"Measure what learning does"},{value:"default",label:"The operating layer"},{value:"team",label:"Infrastructure for people dev"}]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
